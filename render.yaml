services:
  - type: web
    name: marketlens-backend
    runtime: docker
    repo: https://github.com/annareddy1/Investment-Analytics
    branch: main
    plan: free
    region: oregon
    rootDir: backend-java
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: marketlens
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false