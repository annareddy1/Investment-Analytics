cat > ~/Downloads/Investment-Analytics/render.yaml << 'EOF'
services:
  - type: web
    name: marketlens-backend
    runtime: docker
    repo: https://github.com/annareddy1/Investment-Analytics
    branch: main
    plan: free
    region: oregon
    rootDir: backend-java
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: marketlens
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: marketlens
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

databases:
  - name: marketlens-postgres
    databaseName: marketlens
    user: marketlens
    region: oregon
    plan: free
EOF