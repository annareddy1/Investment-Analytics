############################################
# Server
############################################
server.port=${PORT:8001}
server.address=0.0.0.0
spring.application.name=marketlens-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

############################################
# PostgreSQL
############################################
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:marketlens}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

############################################
# MongoDB
############################################
spring.data.mongodb.uri=mongodb+srv://rithikaannareddy962_db_user:postgres123@investment-analytics-cl.82nwsy9.mongodb.net/marketlens?retryWrites=true&w=majority&appName=investment-analytics-cluster
spring.data.mongodb.database=${MONGODB_DATABASE:marketlens}

############################################
# CORS
############################################
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001}

############################################
# External API
############################################
yahoo.finance.api.base-url=https://query1.finance.yahoo.com

############################################
# Logging
############################################
logging.level.root=INFO
logging.level.com.marketlens=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

############################################
# Actuator
############################################
management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-components=always
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true